services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - picsou-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}?sslmode=prefer
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      JWT_SECRET: ${JWT_SECRET}
      CRYPTO_ENCRYPTION_KEY: ${CRYPTO_ENCRYPTION_KEY}
      # URL publique derrière le reverse proxy (redirect URI Enable Banking, etc.)
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      # Fallbacks CORS/cookies si la DB est vierge (la valeur en DB prime)
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      # Optionnels — laissés vides si non définis (le wizard les gère au 1er lancement)
      APP_USERNAME: ${APP_USERNAME:-}
      APP_PASSWORD_HASH: ${APP_PASSWORD_HASH:-}
    volumes:
      # Clé privée Enable Banking générée par le wizard — doit survivre aux redéploiements
      - backend-data:/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - picsou-net

  tr-auth:
    build:
      context: ./services/tr-auth
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - picsou-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:8080"
    depends_on:
      - backend
    networks:
      - picsou-net

volumes:
  pgdata:
  backend-data:

networks:
  picsou-net:
    driver: bridge
