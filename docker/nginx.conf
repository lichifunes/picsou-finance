# Preserve the X-Forwarded-* values an upstream TLS terminator (Caddy, Traefik, NPM,
# Cloudflare Tunnel, …) sent, falling back to this nginx's own values only when it is
# the edge. The backend honors these (server.forward-headers-strategy=framework) so a
# same-origin HTTPS request is recognized as same-origin and not wrongly rejected by CORS.
# Port/host fall through to empty when the upstream sent nothing — nginx then omits the
# header and the backend derives the port from the scheme (443 for https, 80 for http).
map $http_x_forwarded_proto $picsou_xfp   { default $scheme; ~.+ $http_x_forwarded_proto; }
map $http_x_forwarded_host  $picsou_xfh   { default "";      ~.+ $http_x_forwarded_host;  }
map $http_x_forwarded_port  $picsou_xfport { default "";     ~.+ $http_x_forwarded_port;  }

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing - serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend (internal port 9090)
    location /api {
        proxy_pass http://127.0.0.1:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $picsou_xfp;
        proxy_set_header X-Forwarded-Host  $picsou_xfh;
        proxy_set_header X-Forwarded-Port  $picsou_xfport;
        # Some sync flows (Enable Banking, Trade Republic) wait on third-party
        # APIs. The backend caps its own waits, but give nginx breathing room
        # so a slightly slow upstream doesn't surface as a blank 502 page.
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Proxy actuator health checks to backend
    location /actuator {
        proxy_pass http://127.0.0.1:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $picsou_xfp;
        proxy_set_header X-Forwarded-Host  $picsou_xfh;
        proxy_set_header X-Forwarded-Port  $picsou_xfport;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # font-src 'self' covers the Homemade Apple woff2 self-hosted under /fonts/.
    # No third-party font CDN is allowed — part of the zero-phone-home posture.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
